<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>휘삣삐 생존게임</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

#gameContainer{
    position:relative;
}

canvas{
    background:skyblue;
    border:4px solid white;
}

#gameOver{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    text-align:center;
    display:none;
}

#gameOver h1{
    color:white;
    margin-bottom:20px;
    font-size:40px;
}

#restartBtn{
    padding:12px 24px;
    font-size:20px;
    border:none;
    cursor:pointer;
    border-radius:10px;
    background:white;
}

</style>
</head>

<body>

<div id="gameContainer">

<canvas id="gameCanvas" width="800" height="600"></canvas>

<div id="gameOver">
    <h1>다시 플레이</h1>
    <button id="restartBtn">RESTART</button>
</div>

</div>

<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const WIDTH = 800;
const HEIGHT = 600;

let gameOver = false;

const player = {
    x:370,
    y:470,
    width:60,
    height:60,
    speed:7,
    color:"lime",
    hp:3
};

const ground = {
    x:0,
    y:530,
    width:800,
    height:70,
    color:"#5c3b1e"
};

const keys = {};

let obstacles = [];

let startTime = Date.now();

let obstacleSpawnTimer = 0;

document.addEventListener("keydown",(e)=>{
    keys[e.code] = true;
});

document.addEventListener("keyup",(e)=>{
    keys[e.code] = false;
});

function createObstacle(){

    const playTime = getPlayTime();

    const size = Math.random() * 40 + 20;

    const speed = Math.random() * 2 + 3 + (playTime * 0.15);

    obstacles.push({
        x:Math.random() * (WIDTH - size),
        y:-size,
        width:size,
        height:size,
        speed:speed,
        color:"red"
    });
}

function getPlayTime(){
    return ((Date.now() - startTime) / 1000).toFixed(1);
}

function movePlayer(){

    if(keys["ArrowLeft"]){
        player.x -= player.speed;
    }

    if(keys["ArrowRight"]){
        player.x += player.speed;
    }

    if(player.x < 0){
        player.x = 0;
    }

    if(player.x + player.width > WIDTH){
        player.x = WIDTH - player.width;
    }
}

function updateObstacles(){

    const playTime = getPlayTime();

    obstacleSpawnTimer++;

    let spawnRate = Math.max(15, 60 - playTime);

    if(obstacleSpawnTimer >= spawnRate){

        createObstacle();

        if(playTime > 15){
            createObstacle();
        }

        if(playTime > 30){
            createObstacle();
        }

        obstacleSpawnTimer = 0;
    }

    for(let i=obstacles.length-1; i>=0; i--){

        const obs = obstacles[i];

        obs.y += obs.speed;

        if(checkCollision(player, obs)){

            player.hp--;

            obstacles.splice(i,1);

            if(player.hp <= 0){
                endGame();
            }

            continue;
        }

        if(obs.y > HEIGHT){
            obstacles.splice(i,1);
        }
    }
}

function checkCollision(a,b){

    return (
        a.x < b.x + b.width &&
        a.x + a.width > b.x &&
        a.y < b.y + b.height &&
        a.y + a.height > b.y
    );
}

function drawGround(){

    ctx.fillStyle = ground.color;

    ctx.fillRect(
        ground.x,
        ground.y,
        ground.width,
        ground.height
    );
}

function drawPlayer(){

    ctx.fillStyle = player.color;

    ctx.fillRect(
        player.x,
        player.y,
        player.width,
        player.height
    );
}

function drawObstacles(){

    obstacles.forEach(obs=>{

        ctx.fillStyle = obs.color;

        ctx.fillRect(
            obs.x,
            obs.y,
            obs.width,
            obs.height
        );
    });
}

function drawUI(){

    ctx.fillStyle = "white";
    ctx.font = "24px Arial";

    ctx.fillText(
        "TIME : " + getPlayTime() + "s",
        20,
        40
    );

    ctx.fillText(
        "HP : " + player.hp,
        20,
        80
    );
}

function endGame(){

    gameOver = true;

    document.getElementById("gameOver").style.display = "block";
}

function restartGame(){

    player.x = 370;
    player.hp = 3;

    obstacles = [];

    startTime = Date.now();

    obstacleSpawnTimer = 0;

    gameOver = false;

    document.getElementById("gameOver").style.display = "none";

    gameLoop();
}

document.getElementById("restartBtn").addEventListener("click", restartGame);

function update(){

    movePlayer();

    updateObstacles();
}

function draw(){

    ctx.clearRect(0,0,WIDTH,HEIGHT);

    drawGround();

    drawPlayer();

    drawObstacles();

    drawUI();
}

function gameLoop(){

    if(gameOver){
        return;
    }

    update();

    draw();

    requestAnimationFrame(gameLoop);
}

gameLoop();

</script>

</body>
</html>
